<!DOCTYPE html>
<html>
<head>
  <title>🌟 Daily Affirmation</title>
  <style>
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 500px;
    }
    h1 { font-size: 2.5em; margin-bottom: 20px; }
    #affirmation { 
      font-size: 1.5em; 
      line-height: 1.6;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button {
      background: linear-gradient(45deg, #6366f1, #8b5cf6);
      border: none;
      color: white;
      padding: 15px 30px;
      font-size: 1.1em;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌟 Daily Affirmation</h1>
    <div id="affirmation">Click below to receive your affirmation...</div>
    <button onclick="newAffirmation()">New Affirmation</button>
  </div>
  <script>
    const affirmations = [
      "You are capable of amazing things.",
      "Your potential is limitless.",
      "Every day brings new opportunities.",
      "You are worthy of success.",
      "Your work matters.",
      "Progress, not perfection.",
      "You have the power to create change.",
      "Your voice deserves to be heard.",
      "Innovation starts with a single idea.",
      "You are building something meaningful."
    ];
    function newAffirmation() {
      const aff = affirmations[Math.floor(Math.random() * affirmations.length)];
      document.getElementById('affirmation').textContent = aff;
    }
  </script>
</body>
</html>
